name: Add backend PRs to TraefikLabs project

on:
  pull_request:
    types:
      - opened

jobs:
  add-to-project:
    name: Add PR to Traefik Labs project
    runs-on: ubuntu-slim
    steps:
      - uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        with:
          project-url: https://github.com/orgs/traefik/projects/16
          github-token: ${{ secrets.TRAEFIKINFRA_ADD2PROJECT }}
          labeled: area/infrastructure, status/2-needs-review
          label-operator: AND
